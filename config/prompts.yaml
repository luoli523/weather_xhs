# ============================================================
# 穿搭 Infographic 生成 Prompt 配置
# ============================================================
# 在这里编辑 prompt 模板来控制 NotebookLM 生成的穿搭图片风格和内容。
#
# 天气变量（自动从穿搭建议填充）：
#   {city}        - 城市名（如：北京）
#   {date}        - 日期（如：2026-02-12）
#   {weather}     - 天气描述（如：白天晴，夜间晴）
#   {temp_range}  - 温度范围（如：-5℃ ~ 4℃）
#   {feels_like}  - 体感温度（如：-3℃）
#   {category}    - 穿衣等级（如：极寒）
#   {outfit}      - 穿搭建议
#   {tips}        - 小贴士（换行分隔）
#
# 风格变量（从 config/style_options.yaml 随机选取）：
#   {人物描述}       - 主体人物外观描述
#   {年龄段}         - 外观年龄
#   {性别风格}       - 性别气质呈现
#   {情绪氛围}       - 整体情绪氛围
#   {配色说明}       - 整体配色（按穿衣等级分组）
# ============================================================

infographic_prompt: |
  请根据以下城市天气穿搭信息，生成一张时装解析信息图风格插画。

  【天气与穿搭数据】
  城市：{city}
  日期：{date}
  天气：{weather}
  温度：{temp_range}（体感 {feels_like}）
  穿衣等级：{category}
  穿搭建议：{outfit}
  小贴士：
  {tips}

  【视觉风格指令】
  一张时装解析信息图风格插画。

  视觉语言：
  – 半写实动漫风时装插画
  – 柔和阴影，清晰线稿，优雅比例
  – 极简黑色箭头标注与短标签说明
  – 局部材质细节强化（织纹、光泽、罗纹、纤维微距）
  – 印刷级清晰度，整体精致

  场景与背景：
  – 背景融入{city}的标志性城市元素（地标建筑、街景轮廓、城市天际线等），以淡化、简笔或半透明方式呈现，不抢主体
  – 画面整体氛围反映当天天气状况（{weather}），通过光影、色调、空气感营造真实天气氛围
  – 例如：晴天明亮暖光、阴天柔灰色调、雨天湿润水汽感、雪天冷白静谧感

  主体人物：
  {人物描述}
  外观年龄：{年龄段}
  性别气质呈现：{性别风格}
  身材比例：自然真实
  整体情绪氛围：{情绪氛围}

  穿搭拆解元素（不固定排版，自然围绕人物构图）：
  – 根据上述穿衣等级和穿搭建议，结合人物风格与氛围，自由搭配 3–5 个核心单品
  – 包含合理的鞋履和配饰搭配
  – 单品选择应契合人物年龄、性别风格与情绪氛围
  – 每个单品需体现材质细节（面料、织法、质感）

  信息图元素：
  – 3–6 个精简标注箭头，指向剪裁或材质细节
  – 可选：局部材质色块或小型织物示意块
  – 可选：某个单品的细节放大插图（如鞋底纹理 / 面料织法 / 包内结构）
  – 画面平衡，不拥挤
  – 字体为简洁无衬线风格，短标签说明即可（或使用文字占位块）

  整体配色：
  {配色说明}

  整体气质：
  当代时装技术解析插画风格，介于时装速写与产品结构图之间，不是商业广告海报，不是漫画分镜。

  拆解强度：中度


# ============================================================
# 节气 Infographic 生成 Prompt 配置
# ============================================================
# 节气变量（自动从节气信息填充）：
#   {name}        - 节气名称（如：立春）
#   {date}        - 日期（如：2026-02-04）
#   {season}      - 季节（春/夏/秋/冬）
#   {meaning}     - 节气含义
#   {description} - 节气介绍
#   {customs}     - 传统习俗（短文本）
#   {food}        - 节气美食
#   {health_tip}  - 养生提示
# ============================================================

solar_term_prompt: |
  请根据以下中国传统二十四节气信息，生成一张节气文化信息图风格插画。

  【节气数据】
  节气：{name}
  日期：{date}
  季节：{season}季
  含义：{meaning}
  传统习俗：{customs}
  节气美食：{food}
  养生贴士：{health_tip}

  【视觉风格指令】
  一张中国传统节气文化信息图风格插画。

  视觉语言：
  – 中国风水彩/工笔画与现代信息图融合
  – 温润典雅的国风色调，细腻柔和
  – 精致的线条勾勒，局部写意泼墨效果
  – 信息图标与手绘元素结合
  – 印刷级清晰度，整体精致典雅

  场景与背景：
  – 背景融入{season}季的典型自然元素（花草树木、天气景象、农事场景）
  – 体现{name}节气的时令特征和自然变化
  – 画面整体氛围反映{season}季气候特点（春的生机、夏的热烈、秋的丰收、冬的静谧）
  – 可融入传统中国元素（如窗棂、屏风、山水、亭台）作为构图框架

  主体内容：
  – 节气名称"{name}"以书法或印章形式呈现，作为视觉焦点
  – 融入 2-3 个代表性习俗场景的小插画（如美食、活动、自然景象）
  – 1-2 个节气代表性食物的精细手绘
  – 一位身着当季服饰的中国风人物（可选，小比例点缀）

  信息图元素：
  – 节气含义的简短文字说明
  – 习俗和美食的精简图文标注
  – 养生小贴士区块
  – 画面平衡，留白适当
  – 字体为典雅中文风格（宋体/楷体/手写体），信息文字清晰可读

  整体配色：
  – 以{season}季对应的传统色系为主调
  – 春：嫩绿、桃粉、鹅黄、柳青
  – 夏：碧绿、荷粉、天蓝、翠色
  – 秋：枫红、橘黄、金色、褐棕
  – 冬：素白、墨灰、梅红、松绿
  – 整体色调和谐统一，不超过 4-5 个主色

  整体气质：
  中国传统美学与现代信息图的融合，诗意典雅又不失信息传达的清晰性。
  既有传统文化的韵味，又有现代设计的简洁感。
