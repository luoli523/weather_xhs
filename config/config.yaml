# 城市列表配置
# location_id 格式为 "纬度,经度"
cities:
  - name: 北京
    location_id: "39.90,116.40"
  - name: 上海
    location_id: "31.23,121.47"
  - name: 深圳
    location_id: "22.54,114.06"
  - name: 成都
    location_id: "30.57,104.07"
  - name: 西安
    location_id: "34.26,108.94"
  - name: 厦门
    location_id: "24.48,118.09"
  - name: 哈尔滨
    location_id: "45.75,126.65"
  - name: 拉萨
    location_id: "29.65,91.13"
  - name: 丽江
    location_id: "26.87,100.22"
  - name: 新加坡
    location_id: "1.35,103.82"
  - name: 大理
    location_id: "25.59,100.23"
  - name: 长沙
    location_id: "28.23,112.94"

# 每次生成信息图的城市数量（从上述城市中随机选取）
infographic_count: 2

# OpenWeatherMap API 配置
# 免费版: 每天 1000 次调用
openweathermap:
  api_key: "${OPENWEATHERMAP_API_KEY}"  # 通过环境变量注入

# LLM 配置
# 厂商选择和 API Key 通过 .env 中的 LLM_PROVIDER 和对应 xxx_API_KEY 设置
# 这里仅配置模型参数（可按需覆盖厂商默认模型）
llm:
  # model: "gpt-4o"                 # 可选：覆盖厂商默认模型
  max_completion_tokens: 16000       # 最大输出 token 数

# 输出配置
output:
  dir: "./output"
