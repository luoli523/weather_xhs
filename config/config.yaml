# 城市列表配置
# location_id 格式为 "纬度,经度"
cities:
  - name: 北京
    location_id: "39.90,116.40"
  - name: 上海
    location_id: "31.23,121.47"
  - name: 深圳
    location_id: "22.54,114.06"
  - name: 新加坡
    location_id: "1.35,103.82"
  - name: 大理
    location_id: "25.59,100.23"
  - name: 长沙
    location_id: "28.23,112.94"

# OpenWeatherMap API 配置
# 免费版: 每天 1000 次调用
openweathermap:
  api_key: "${OPENWEATHERMAP_API_KEY}"  # 通过环境变量注入

# OpenAI GPT 配置
# 穿搭 prompt、节气内容、诗词匹配均使用此配置
openai:
  model: "gpt-5"                    # 模型名称
  max_completion_tokens: 16000       # 最大输出 token 数（含推理 token）
  # response_format 由各模块按需设置（穿搭=纯文本，节气/诗词=json_object）

# 输出配置
output:
  dir: "./output"
