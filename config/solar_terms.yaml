# ============================================================
# 二十四节气配置 — 描述、风俗、饮食、养生
# ============================================================
# sxtwl 库中节气顺序：
#   冬至(0) 小寒(1) 大寒(2) 立春(3) 雨水(4) 惊蛰(5)
#   春分(6) 清明(7) 谷雨(8) 立夏(9) 小满(10) 芒种(11)
#   夏至(12) 小暑(13) 大暑(14) 立秋(15) 处暑(16) 白露(17)
#   秋分(18) 寒露(19) 霜降(20) 立冬(21) 小雪(22) 大雪(23)
# ============================================================

solar_terms:
  冬至:
    season: 冬
    meaning: 阳光直射南回归线，北半球白昼最短，此后昼渐长
    description: |
      冬至是二十四节气中最重要的节气之一，又称"冬节"。
      古人认为冬至是阴极之至，阳气始生，是一个吉祥的日子。
      民间有"冬至大如年"的说法。
    customs:
      - 北方吃饺子，有"冬至不端饺子碗，冻掉耳朵没人管"之说
      - 南方吃汤圆，寓意团圆
      - 祭祖扫墓，缅怀先人
      - 九九消寒，从冬至起数九天为一九
    food: 饺子、汤圆、羊肉汤、八宝粥
    health_tip: 冬至养生注重补阳，宜多食温热滋补之物，早睡晚起

  小寒:
    season: 冬
    meaning: 天气渐寒，尚未到最冷时节
    description: |
      小寒标志着一年中最寒冷的日子即将到来。
      民谚"小寒大寒，冻成冰团"，此时正值三九寒天。
    customs:
      - 腊八节常在小寒前后，喝腊八粥
      - 探梅赏雪，感受冬日清雅之美
      - 冰戏嬉闹，北方滑冰溜冰
    food: 腊八粥、糯米饭、涮羊肉、热汤面
    health_tip: 小寒时节注意防寒保暖，适量进补，多喝温热汤水

  大寒:
    season: 冬
    meaning: 一年中最冷的时节
    description: |
      大寒是二十四节气中最后一个节气，也是冬季最寒冷的时期。
      大寒过后便是立春，寒极必暖，否极泰来。
    customs:
      - 尾牙祭，商家宴请员工
      - 准备年货，迎接新年
      - 除旧迎新，大扫除
    food: 八宝饭、年糕、鸡汤、糯米酒
    health_tip: 大寒养生宜温补，注意心脑血管保护，保持室内空气流通

  立春:
    season: 春
    meaning: 春季开始，万物复苏
    description: |
      立春是二十四节气之首，意味着新的一个轮回已开始。
      "立"有开始之意，"春"代表温暖、生长。
      万物渐次苏醒，大地开始回暖。
    customs:
      - 咬春，吃春饼、春卷
      - 打春牛，鞭策耕牛迎春耕
      - 贴"春"字，迎接新春
      - 踏青赏花，感受春回大地
    food: 春饼、春卷、萝卜、韭菜
    health_tip: 立春养生宜疏肝理气，多食绿色蔬菜，适量运动舒展身体

  雨水:
    season: 春
    meaning: 降雨开始增多，气温回升
    description: |
      雨水节气表示降水开始，雨量渐增。
      冰雪融化，春雨润泽大地，草木萌动。
    customs:
      - 拉保保（认干爹），为孩子祈福
      - 占稻色，预测当年稻谷收成
      - 回娘屋，出嫁女儿回娘家
    food: 蜂蜜水、红枣、山药、豆苗
    health_tip: 雨水时节乍暖还寒，注意春捂，健脾祛湿

  惊蛰:
    season: 春
    meaning: 春雷始鸣，蛰伏昆虫被惊醒
    description: |
      惊蛰古称"启蛰"，春雷乍动，惊醒了蛰伏在泥土中的各种昆虫。
      此时气温回升较快，大部分地区进入春耕季节。
    customs:
      - 吃梨，润肺止咳，"惊蛰吃梨，一年不咳嗽"
      - 打小人，驱赶霉运
      - 蒙鼓皮，祭祀雷神
    food: 梨、枸杞、菠菜、韭菜
    health_tip: 惊蛰时节宜养肝健脾，多食清淡时令蔬果

  春分:
    season: 春
    meaning: 昼夜等长，春季过半
    description: |
      春分日，太阳直射赤道，全球昼夜等长。
      此后北半球白昼渐长，春意渐浓，百花盛开。
    customs:
      - 竖蛋，春分竖鸡蛋讨彩头
      - 吃春菜，采摘野菜
      - 放风筝，踏青赏花
      - 春祭祭祖
    food: 春菜、香椿、荠菜、马兰头
    health_tip: 春分养生宜调和阴阳，饮食宜清淡平和

  清明:
    season: 春
    meaning: 天清地明，万物生长
    description: |
      清明既是节气又是传统节日，兼具自然与人文两大内涵。
      气清景明，万物皆显，是踏青扫墓的好时节。
    customs:
      - 扫墓祭祖，缅怀先人
      - 踏青郊游，亲近自然
      - 插柳戴柳，驱邪避灾
      - 放风筝，寄托美好愿望
    food: 青团、艾粄、清明粑、螺蛳
    health_tip: 清明时节宜养肝护肝，注意情绪调节，多户外活动

  谷雨:
    season: 春
    meaning: 雨生百谷，播种移苗的最佳时节
    description: |
      谷雨是春季最后一个节气，降雨增多，有利于谷物生长。
      "清明断雪，谷雨断霜"，此后气候温暖怡人。
    customs:
      - 喝谷雨茶，清火明目
      - 赏牡丹花，"谷雨三朝看牡丹"
      - 走谷雨，年轻人踏青相会
    food: 谷雨茶、香椿、菠萝、樱桃
    health_tip: 谷雨时节湿气渐重，饮食宜清淡祛湿，适当运动

  立夏:
    season: 夏
    meaning: 夏季开始，万物繁茂
    description: |
      立夏标志着夏季的开始，温度明显升高，炎暑将临。
      万物至此皆长大，故名立夏。
    customs:
      - 称人，立夏称体重祈福健康
      - 斗蛋，孩子们互碰鸡蛋比坚硬
      - 吃蛋，补充营养迎接酷暑
      - 尝三鲜（樱桃、枇杷、杏子）
    food: 鸡蛋、蚕豆、苋菜、樱桃、枇杷
    health_tip: 立夏养生重养心，宜静心安神，午休补充精力

  小满:
    season: 夏
    meaning: 小麦等夏熟作物籽粒渐满但未成熟
    description: |
      小满是夏季第二个节气，麦粒饱满但尚未成熟。
      "小满不满，干断田坎"，雨水开始增多。
    customs:
      - 祭车神，祈愿水源涌旺
      - 抢水，争取农田灌溉用水
      - 食苦菜，清热去火
    food: 苦菜、枸杞苗、麦仁粥、绿豆
    health_tip: 小满时节宜清热利湿，饮食清淡，少食油腻

  芒种:
    season: 夏
    meaning: 有芒之谷类作物可播种，农事最忙
    description: |
      芒种意为"有芒的麦子快收、有芒的稻子可种"。
      此时正值农忙，也是梅雨季节开始的标志。
    customs:
      - 送花神，为花神饯行
      - 安苗，祈求丰收
      - 煮梅，青梅煮酒
    food: 青梅、杨梅、桑葚、乌梅汤
    health_tip: 芒种时节气温升高、雨量充沛，防暑祛湿，适当午休

  夏至:
    season: 夏
    meaning: 北半球白昼最长，盛夏开始
    description: |
      夏至日太阳直射北回归线，北半球白昼达到全年最长。
      此后虽白昼渐短，但气温继续升高，即将进入最热的三伏天。
    customs:
      - 吃面条，"冬至饺子夏至面"
      - 晒伏，晾晒衣物书画
      - 祭地，古代帝王祭祀
    food: 面条、凉面、西瓜、绿豆汤、酸梅汤
    health_tip: 夏至养生宜清热消暑，多饮水，避免长时间暴晒

  小暑:
    season: 夏
    meaning: 暑热渐起，即将入伏
    description: |
      小暑表示天气开始炎热，但还没到最热的时候。
      "小暑过，每日热三分"，即将进入三伏天。
    customs:
      - 食新，尝新米、新面
      - 晒书画，利用伏天阳光灭虫
      - 吃伏羊，"彭城伏羊一碗汤，不用神医开药方"
    food: 莲藕、绿豆芽、冬瓜、黄瓜、鳝鱼
    health_tip: 小暑注意防暑降温，静心安神，少动多静

  大暑:
    season: 夏
    meaning: 一年中最热的时节
    description: |
      大暑是一年中阳光最猛烈、最炎热的节气。
      "大暑小暑，上蒸下煮"，正值三伏天中的中伏。
    customs:
      - 饮伏茶，消暑解渴
      - 晒伏姜，冬吃萝卜夏吃姜
      - 烧伏香，祈丰收
      - 送大暑船，祈求平安
    food: 仙草冻、绿豆汤、凉茶、荔枝、芒果
    health_tip: 大暑养生重在防暑降温，补充水分，避免中暑

  立秋:
    season: 秋
    meaning: 秋季开始，暑去凉来
    description: |
      立秋意味着暑去秋来，虽然暑热一时难消（秋老虎），
      但总的趋势是天气逐渐凉爽。"一叶知秋"从此开始。
    customs:
      - 贴秋膘，夏天掉的肉秋天补回来
      - 啃秋，吃西瓜告别夏天
      - 晒秋，晾晒农作物
    food: 西瓜、龙眼、红烧肉、炖肉、秋桃
    health_tip: 立秋后饮食宜润燥养肺，少辛多酸

  处暑:
    season: 秋
    meaning: 暑气终止，秋意渐浓
    description: |
      处暑即"出暑"，暑气至此而止。
      天气由炎热向凉爽过渡，秋高气爽的天气渐渐到来。
    customs:
      - 放河灯，悼念逝者、祈福
      - 开渔节，渔民出海捕鱼
      - 吃鸭子，"处暑送鸭，无病各家"
    food: 鸭肉、银耳、百合、莲子、梨
    health_tip: 处暑后注意秋燥，早睡早起，适量运动

  白露:
    season: 秋
    meaning: 天气转凉，露水凝白
    description: |
      白露是秋天第三个节气，清晨的露水开始凝结成白色。
      "白露秋分夜，一夜凉一夜"，昼夜温差明显加大。
    customs:
      - 收清露，百草上的露水有明目功效
      - 饮白露茶，秋茶香醇
      - 酿白露米酒，温润甘甜
    food: 白露茶、龙眼、红薯、板栗、银杏
    health_tip: 白露后不宜赤膊露身，注意保暖，养肺润燥

  秋分:
    season: 秋
    meaning: 昼夜等长，秋季过半
    description: |
      秋分日太阳直射赤道，全球昼夜再次等长。
      此后北半球夜渐长昼渐短，秋意更浓，天高气爽。
    customs:
      - 秋祭月，中秋前后赏月
      - 吃秋菜，野苋菜煲汤
      - 竖蛋，秋分竖蛋游戏
      - 丰收节，庆祝秋收
    food: 秋菜汤、桂花糕、螃蟹、柿子、石榴
    health_tip: 秋分后阴气渐长，饮食宜温润，注意胃肠保养

  寒露:
    season: 秋
    meaning: 露水更凉，将要结霜
    description: |
      寒露比白露气温更低，露水更寒，即将凝结为霜。
      深秋已至，菊花盛开，枫叶渐红。
    customs:
      - 登高赏菊，与重阳相近
      - 饮菊花酒，驱邪延寿
      - 吃花糕，寓意步步高
      - 赏红叶，北京香山红叶正当时
    food: 菊花茶、花糕、柿子、栗子、芝麻
    health_tip: 寒露后足部保暖很重要，"寒露脚不露"

  霜降:
    season: 秋
    meaning: 天气渐冷，初霜出现
    description: |
      霜降是秋季最后一个节气，天气渐冷，初霜显现。
      "霜降杀百草"，但也是赏菊、吃柿子的好时节。
    customs:
      - 赏菊饮酒，菊花盛开
      - 吃柿子，"霜降吃柿子，不会流鼻涕"
      - 登高望远，秋游
      - 进补，为入冬做准备
    food: 柿子、萝卜、牛肉、羊肉、板栗
    health_tip: 霜降进补，调养脾胃，注意保暖防寒

  立冬:
    season: 冬
    meaning: 冬季开始，万物收藏
    description: |
      立冬标志着冬季的开始，"立，建始也；冬，终也，万物收藏也。"
      天气转冷，草木凋零，动物蛰伏。
    customs:
      - 补冬，"立冬补冬，补嘴空"
      - 吃饺子，北方传统
      - 酿黄酒，绍兴冬酿
      - 涮火锅，暖身暖心
    food: 饺子、涮羊肉、萝卜炖排骨、糯米团
    health_tip: 立冬后宜早睡晚起，注意防寒保暖，适度进补

  小雪:
    season: 冬
    meaning: 气温下降，开始降雪但雪量不大
    description: |
      小雪节气后，气温持续走低，天气寒冷。
      北方开始降雪，但雪量较小，故称"小雪"。
    customs:
      - 腌腊肉，"冬腊风腌，蓄以御冬"
      - 晒鱼干，沿海地区腌制海鲜
      - 吃糍粑，南方传统
    food: 腊肉、糍粑、羊肉汤、刨汤（杀猪菜）
    health_tip: 小雪后注意保暖和情绪调节，多晒太阳，防止抑郁

  大雪:
    season: 冬
    meaning: 雪量增大，天寒地冻
    description: |
      大雪节气后降雪量增大，气温显著下降。
      "瑞雪兆丰年"，厚厚的积雪覆盖大地，保温保墒。
    customs:
      - 赏雪景，踏雪寻梅
      - 进补，"冬天进补，开春打虎"
      - 腌肉，准备过年腊味
      - 滑冰嬉雪
    food: 羊肉、狗肉、红薯粥、萝卜排骨汤、火锅
    health_tip: 大雪时节宜温补助阳，多食黑色食物（黑芝麻、黑豆），注意头脚保暖
