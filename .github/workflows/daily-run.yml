name: 每日穿搭指南生成

on:
  schedule:
    # 每天 UTC 0:00 = 北京时间 8:00
    - cron: "0 0 * * *"
  workflow_dispatch:
    # 支持手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Restore NotebookLM auth
        run: |
          mkdir -p ~/.notebooklm
          echo "$NOTEBOOKLM_STORAGE_STATE" | base64 -d > ~/.notebooklm/storage_state.json
        env:
          NOTEBOOKLM_STORAGE_STATE: ${{ secrets.NOTEBOOKLM_STORAGE_STATE }}

      - name: Restore XHS auth
        if: env.XHS_STORAGE_STATE != ''
        run: |
          mkdir -p ~/.xhs
          echo "$XHS_STORAGE_STATE" | base64 -d > ~/.xhs/storage_state.json
          echo "XHS_ENABLED=true" >> "$GITHUB_ENV"
        env:
          XHS_STORAGE_STATE: ${{ secrets.XHS_STORAGE_STATE }}

      - name: Run pipeline
        env:
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          TELEGRAM_ENABLED: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Upload output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clothing-guide-${{ github.run_id }}
          path: output/
          retention-days: 7
