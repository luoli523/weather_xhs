name: 每日穿搭指南生成

on:
  schedule:
    # 每天 UTC 0:00 = 北京时间 8:00
    - cron: "0 0 * * *"
  workflow_dispatch:
    # 支持手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Restore NotebookLM auth
        run: |
          mkdir -p ~/.notebooklm
          echo "$NOTEBOOKLM_STORAGE_STATE" | base64 -d > ~/.notebooklm/storage_state.json
        env:
          NOTEBOOKLM_STORAGE_STATE: ${{ secrets.NOTEBOOKLM_STORAGE_STATE }}

      - name: Restore XHS auth
        run: |
          if [ -n "$XHS_STORAGE_STATE" ]; then
            mkdir -p ~/.xhs
            echo "$XHS_STORAGE_STATE" | base64 -d > ~/.xhs/storage_state.json
            echo "✅ XHS auth restored"
          else
            echo "⏭ No XHS auth configured, skipping"
          fi
        env:
          XHS_STORAGE_STATE: ${{ secrets.XHS_STORAGE_STATE }}

      - name: Restore Instagram session
        run: |
          if [ -n "$IG_SESSION" ]; then
            mkdir -p ~/.instagram
            echo "$IG_SESSION" | base64 -d > ~/.instagram/session.json
            echo "✅ IG session restored"
          else
            echo "⏭ No IG session configured, skipping"
          fi
        env:
          IG_SESSION: ${{ secrets.IG_SESSION }}

      - name: Run pipeline
        env:
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_ENABLED: ${{ secrets.TELEGRAM_ENABLED }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          XHS_ENABLED: ${{ secrets.XHS_ENABLED }}
          IG_ENABLED: ${{ secrets.IG_ENABLED }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
        run: python main.py

      - name: Upload output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clothing-guide-${{ github.run_id }}
          path: output/
          retention-days: 7
